<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Sakha-Sakhi 💜</title>

  <!-- GOOGLE FONTS -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg-orbs">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

  </div>

  <!-- PARTICLES -->
  <div
    class="particles"
    id="particles"
  ></div>

  <!-- ONBOARDING SCREEN -->
  <section
    class="screen"
    id="screen-onboarding"
  >

    <div class="onboarding-card glass-card">

      <!-- AVATAR -->
      <div class="priya-avatar-wrap">

        <div class="priya-avatar">

          <div class="avatar-face">

            <div class="avatar-eyes">

              <div class="eye">
                <div class="pupil"></div>
              </div>

              <div class="eye">
                <div class="pupil"></div>
              </div>

            </div>

            <div class="avatar-smile"></div>

          </div>

          <div class="avatar-pulse"></div>

        </div>

      </div>

      <!-- TITLE -->
      <h1 class="brand-name">
        Sakha-Sakhi
      </h1>

      <div class="brand-tagline">
        Your Emotional Companion
      </div>

      <!-- INTRO -->
      <div class="onboarding-text">

        <p>
          Hey 💜 I'm here to listen,
          support and stay with you through every emotion.
        </p>

        <p class="sub-text">
          Let's begin our conversation ✨
        </p>

      </div>

      <!-- NAME INPUT -->
      <div class="name-form">

        <div class="input-group">

          <input
            type="text"
            id="user-name-input"
            class="name-input"
            placeholder="Enter your name..."
          >

        </div>

        <!-- BUTTON -->
        <button
          type="button"
          class="btn-start"
          onclick="startChat()"
        >

          <span>
            Let's Chat
          </span>

          <span class="btn-icon">
            →
          </span>

        </button>

      </div>

      <div class="privacy-note">
        Safe space • Private • Judgment free 🌸
      </div>

    </div>

  </section>

  <!-- CHAT SCREEN -->
  <section
    class="screen"
    id="screen-chat"
    style="display:none;"
  >

    <!-- HEADER -->
    <header class="chat-header glass-header">

      <div class="header-left">

        <div class="header-avatar">

          <div class="ha-face">

            <div class="ha-eyes">

              <div class="ha-eye"></div>
              <div class="ha-eye"></div>

            </div>

            <div class="ha-smile"></div>

          </div>

          <div class="status-dot"></div>

        </div>

        <div class="header-info">

          <div class="header-name">
            Priya 💜
          </div>

          <div
            class="header-status"
            id="header-status"
          >
            ● Online & Listening
          </div>

        </div>

      </div>

      <!-- MOOD -->
      <div class="mood-badge">

        <span
          class="mood-emoji"
          id="mood-emoji"
        >
          😊
        </span>

        <span
          class="mood-label"
          id="mood-label"
        >
          Calm
        </span>

      </div>

    </header>

    <!-- CHAT WINDOW -->
    <main
      class="chat-window"
      id="chat-window"
    ></main>

<!-- FOOTER -->
<footer class="glass-footer">

  <div class="input-wrapper">

    <textarea
      id="msg-input"
      class="msg-textarea"
      placeholder="Type your message..."
      rows="1"
    ></textarea>

    <button
      type="button"
      class="btn-send"
      id="btn-send"
      onclick="sendMessage()"
    >
      SEND
    </button>

  </div>

  <div class="char-hint">
    Press Enter to send
  </div>

</footer>
  </section>

  <!-- JAVASCRIPT -->
  <script
    src="app.js"
    defer
  ></script>

</body>
</html>
