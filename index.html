<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sakha-Sakhi 💜</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- ONBOARDING SCREEN -->
<div class="screen" id="screen-onboarding">

  <div class="onboarding-card">

    <h1>Sakha-Sakhi 💜</h1>

    <p>Your emotional AI companion</p>

    <input
      type="text"
      id="user-name-input"
      placeholder="Enter your name..."
    >

    <button
      type="button"
      id="btn-start"
      onclick="startChat()"
    >
      Let's Chat 💜
    </button>

  </div>

</div>

<!-- CHAT SCREEN -->
<div
  class="screen"
  id="screen-chat"
  style="display:none;"
>

  <!-- HEADER -->
  <div class="chat-header">

    <div>
      <h2>Sakha-Sakhi 💜</h2>

      <span
        id="header-status"
      >
        ● Online & listening
      </span>
    </div>

    <div
      class="mood-badge"
      id="mood-badge"
    >
      <span id="mood-emoji">😊</span>
      <span id="mood-label">Calm</span>
    </div>

  </div>

  <!-- CHAT -->
  <div
    class="chat-window"
    id="chat-window"
  ></div>

  <!-- INPUT -->
  <div class="chat-input-area">

    <textarea
      id="msg-input"
      placeholder="Tell me anything..."
      rows="1"
    ></textarea>

    <button
      id="btn-send"
      onclick="sendMessage()"
    >
      Send
    </button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
